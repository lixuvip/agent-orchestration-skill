<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent orchestration workflow overview</title>
  <desc id="desc">A clean four-step workflow: user request, orchestrator, role agents, and final delivery, supported by callbacks, task state, and heartbeat monitoring.</desc>
  <rect width="1200" height="560" rx="36" fill="#0B1220"/>
  <rect x="44" y="44" width="1112" height="472" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="#38BDF8"/>
    </marker>
    <style>
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
      .eyebrow { fill: #38BDF8; font-size: 15px; font-weight: 700; letter-spacing: .08em; }
      .headline { fill: #F8FAFC; font-size: 34px; font-weight: 800; }
      .subhead { fill: #CBD5E1; font-size: 18px; }
      .step { fill: #182235; stroke: #475569; stroke-width: 2; }
      .stepHot { fill: #0EA5E9; stroke: #BAE6FD; stroke-width: 3; }
      .support { fill: #0F172A; stroke: #334155; stroke-width: 2; }
      .title { fill: #F8FAFC; font-size: 22px; font-weight: 800; }
      .titleDark { fill: #082F49; font-size: 22px; font-weight: 800; }
      .body { fill: #CBD5E1; font-size: 15px; }
      .bodyDark { fill: #082F49; font-size: 15px; font-weight: 650; }
      .pill { fill: #123044; stroke: #38BDF8; stroke-width: 1.5; }
      .pillText { fill: #BAE6FD; font-size: 13px; font-weight: 700; }
      .line { stroke: #38BDF8; stroke-width: 3; marker-end: url(#arrow); }
    </style>
  </defs>

  <text class="label eyebrow" x="76" y="92">CODEX MULTI-AGENT WORKFLOW</text>
  <text class="label headline" x="76" y="134">One coordinator. Multiple focused agents.</text>
  <text class="label subhead" x="76" y="166">Delegate complex Codex work into scoped roles, collect evidence, and deliver a reviewed final result.</text>

  <rect class="step" x="82" y="238" width="208" height="118" rx="22"/>
  <circle cx="124" cy="277" r="18" fill="#1E293B" stroke="#38BDF8" stroke-width="2"/>
  <text class="label" x="119" y="283" fill="#BAE6FD" font-size="18" font-weight="800">1</text>
  <text class="label title" x="150" y="282">Request</text>
  <text class="label body" x="112" y="316">Goal, repository,</text>
  <text class="label body" x="112" y="338">scope, constraints</text>

  <rect class="stepHot" x="360" y="218" width="230" height="158" rx="26"/>
  <circle cx="404" cy="263" r="20" fill="#082F49"/>
  <text class="label" x="398" y="270" fill="#BAE6FD" font-size="18" font-weight="800">2</text>
  <text class="label titleDark" x="436" y="270">Orchestrator</text>
  <text class="label bodyDark" x="396" y="308">Chooses workflow</text>
  <text class="label bodyDark" x="396" y="331">Dispatches role prompts</text>
  <text class="label bodyDark" x="396" y="354">Reviews terminal output</text>

  <rect class="step" x="660" y="218" width="250" height="158" rx="26"/>
  <circle cx="704" cy="263" r="20" fill="#1E293B" stroke="#38BDF8" stroke-width="2"/>
  <text class="label" x="698" y="270" fill="#BAE6FD" font-size="18" font-weight="800">3</text>
  <text class="label title" x="736" y="270">Role Agents</text>
  <rect class="pill" x="700" y="300" width="78" height="30" rx="15"/>
  <text class="label pillText" x="721" y="320">Plan</text>
  <rect class="pill" x="790" y="300" width="78" height="30" rx="15"/>
  <text class="label pillText" x="809" y="320">Code</text>
  <rect class="pill" x="700" y="340" width="78" height="30" rx="15"/>
  <text class="label pillText" x="712" y="360">Review</text>
  <rect class="pill" x="790" y="340" width="78" height="30" rx="15"/>
  <text class="label pillText" x="813" y="360">QA</text>

  <rect class="step" x="980" y="238" width="138" height="118" rx="22"/>
  <circle cx="1019" cy="277" r="18" fill="#1E293B" stroke="#38BDF8" stroke-width="2"/>
  <text class="label" x="1014" y="283" fill="#BAE6FD" font-size="18" font-weight="800">4</text>
  <text class="label title" x="1039" y="282">Final</text>
  <text class="label body" x="1009" y="316">Verified</text>
  <text class="label body" x="1009" y="338">delivery</text>

  <path class="line" d="M290 297H347"/>
  <path class="line" d="M590 297H647"/>
  <path class="line" d="M910 297H967"/>

  <rect class="support" x="136" y="420" width="258" height="58" rx="18"/>
  <text class="label title" x="166" y="456" font-size="18">Callbacks</text>
  <text class="label body" x="270" y="456">role replies with evidence</text>

  <rect class="support" x="472" y="420" width="258" height="58" rx="18"/>
  <text class="label title" x="502" y="456" font-size="18">Task State</text>
  <text class="label body" x="619" y="456">DONE / BLOCKED / RISK</text>

  <rect class="support" x="808" y="420" width="258" height="58" rx="18"/>
  <text class="label title" x="838" y="456" font-size="18">Heartbeat</text>
  <text class="label body" x="953" y="456">polls long-running work</text>
</svg>
